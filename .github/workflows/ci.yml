name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  validate:
    name: Validate Plugin Structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm ci
      - name: Check plugin.json
        run: node -e "const p=require('./.claude-plugin/plugin.json'); console.log('Plugin:', p.name, 'v'+p.version); assert(p.name && p.description && p.version)"
      - name: Check required directories
        run: |
          for d in skills agents commands hooks; do
            [ -d "$d" ] && echo "✓ $d/ exists" || (echo "✗ $d/ missing" && exit 1)
          done
      - name: Check hooks.json
        run: node -e "const h=require('./hooks/hooks.json'); ['SessionStart','PostToolUse','Stop'].forEach(k => { if (!h.hooks[k]) throw new Error(k + ' hook missing') }); console.log('✓ All hooks present')"

  build:
    name: Build + Typecheck + Lint
    runs-on: ubuntu-latest
    needs: [validate]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Run graph tests
        run: node --test dist/test/graph.test.js
      - name: Run search tests
        run: node --test dist/test/search.test.js
      - name: Run parser tests
        run: node --test dist/test/parsers/*.test.js
      - name: Run batch tests
        run: node --test dist/test/batch.test.js dist/test/batch-cli.test.js dist/test/batch-mcp.test.js
      - name: Run quality gate tests
        run: node --test dist/test/cli-quality-gate.test.js dist/test/mcp-quality-gate.test.js
      - name: Run fs-tools and git-diff tests
        run: node --test dist/test/fs-tools.test.js dist/test/git-diff.test.js
      - name: Run skill trigger tests
        run: node --test test/skill-triggers.test.mjs

  check-references:
    name: Check Skill References
    runs-on: ubuntu-latest
    needs: [validate]
    steps:
      - uses: actions/checkout@v4
      - name: Verify SKILL.md references exist
        run: |
          for skill_dir in skills/*/; do
            skill_name=$(basename "$skill_dir")
            if [ -f "$skill_dir/SKILL.md" ]; then
              # Extract referenced files from SKILL.md
              refs=$(grep -oP 'references/\S+\.md' "$skill_dir/SKILL.md" 2>/dev/null || true)
              for ref in $refs; do
                if [ ! -f "$skill_dir/$ref" ]; then
                  echo "✗ Missing reference: $skill_dir/$ref"
                  exit 1
                fi
                echo "✓ Found: $skill_dir/$ref"
              done
            fi
          done
          echo "✓ All referenced files exist"
